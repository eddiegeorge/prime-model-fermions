<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prime Codebook — Audio</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', system-ui, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; }
#main { display: block; padding: 24px; }
h2.title { color: #fff; font-size: 20px; letter-spacing: 0.5px; margin-bottom: 4px; }
p.subtitle { color: #888; font-size: 13px; margin-bottom: 24px; }
h3.section { color: #aaa; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
.grid4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 28px; }
.grid3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.packet-btn, .fermion-btn { border-radius: 8px; padding: 12px 8px; cursor: pointer; transition: all 0.15s; }
.packet-btn { background: #2a2a4a; color: #ccc; }
.packet-btn .prime { font-size: 22px; font-weight: 700; }
.packet-btn .modes { font-size: 11px; color: #888; margin-top: 4px; }
.packet-btn .freqs { font-size: 10px; color: #666; margin-top: 2px; }
.packet-btn.active { color: #fff; }
.packet-btn.active .modes { color: #ddd; }
.packet-btn.active .freqs { color: #ccc; }
.fermion-btn { background: #2a2a4a; color: #ccc; text-align: left; }
.fermion-btn .symbol { font-size: 18px; font-weight: 700; }
.fermion-btn .name { font-size: 12px; font-weight: 400; margin-left: 6px; opacity: 0.7; }
.fermion-btn .primes { font-size: 11px; color: #777; margin-top: 4px; }
.fermion-btn.active { color: #fff; }
.fermion-btn.active .primes { color: #ddd; }
#stop-btn { display: none; position: fixed; bottom: 20px; right: 20px; background: #e06c75; border: none; border-radius: 50%; width: 48px; height: 48px; cursor: pointer; color: #fff; font-size: 18px; font-weight: 700; }
@media (max-width: 480px) { .grid4 { grid-template-columns: repeat(2, 1fr); } .grid3 { grid-template-columns: repeat(2, 1fr); } }
</style>
</head>
<body>

<div id="main" style="padding: 24px;">
  <h2 class="title">Prime Codebook — Audio</h2>
  <p class="subtitle">Each prime packet is a chord. Each fermion is a chord sequence. Base: k × 220 Hz.</p>
  <h3 class="section">Packets</h3>
  <div class="grid4" id="packets"></div>
  <h3 class="section">Fermions</h3>
  <div class="grid3" id="fermions"></div>
</div>

<button id="stop-btn" onclick="stopAll()">■</button>

<script>
const BASE = 220;
const PACKETS = [
  { prime: 5, modes: [1, 2], color: "#4A90D9" },
  { prime: 17, modes: [1, 4], color: "#7B68EE" },
  { prime: 53, modes: [2, 7], color: "#E06C75" },
  { prime: 59, modes: [1, 3, 7], color: "#E5C07B" },
  { prime: 97, modes: [4, 9], color: "#56B6C2" },
  { prime: 127, modes: [1, 3, 6, 9], color: "#C678DD" },
  { prime: 211, modes: [1, 4, 7, 8, 9], color: "#98C379" },
  { prime: 271, modes: [4, 5, 6, 7, 8, 9], color: "#D19A66" },
];
const FERMIONS = [
  { name: "electron", symbol: "e", primes: [5, 53, 59, 127, 271], a: 2, sector: "Lepton" },
  { name: "muon", symbol: "μ", primes: [5, 53, 59, 127, 211, 271], a: 2, sector: "Lepton" },
  { name: "tau", symbol: "τ", primes: [5, 17, 53, 59, 127, 211, 271], a: 2, sector: "Lepton" },
  { name: "up", symbol: "u", primes: [5, 17, 53, 59, 97, 211], a: 0, sector: "Up" },
  { name: "charm", symbol: "c", primes: [5, 17, 53, 59, 97, 127, 211], a: 2, sector: "Up" },
  { name: "top", symbol: "t", primes: [5, 17, 53, 59, 97, 127, 211, 271], a: 2, sector: "Up" },
  { name: "down", symbol: "d", primes: [17, 97, 127, 211, 271], a: 0, sector: "Down" },
  { name: "strange", symbol: "s", primes: [5, 17, 97, 127, 211, 271], a: 2, sector: "Down" },
  { name: "bottom", symbol: "b", primes: [5, 17, 53, 97, 127, 211, 271], a: 2, sector: "Down" },
];
const SCOLORS = { Lepton: "#E06C75", Up: "#56B6C2", Down: "#E5C07B" };

let synth = null;
let timers = [];
let activeId = null;

function makeSynth() {
  if (synth) { synth.dispose(); synth = null; }
  synth = new Tone.PolySynth(Tone.Synth, {
    maxPolyphony: 16,
    voice: Tone.Synth,
    options: {
      oscillator: { type: "sine" },
      envelope: { attack: 0.05, decay: 0.3, sustain: 0.4, release: 0.8 },
      volume: -12,
    },
  }).toDestination();
  return synth;
}

function stopAll() {
  timers.forEach(clearTimeout);
  timers = [];
  if (synth) { synth.dispose(); synth = null; }
  if (activeId) {
    document.querySelectorAll('.packet-btn, .fermion-btn').forEach(b => {
      b.classList.remove('active');
      b.style.background = '#2a2a4a';
    });
  }
  activeId = null;
  document.getElementById('stop-btn').style.display = 'none';
}

function setActive(id, color) {
  stopAll();
  activeId = id;
  const el = document.getElementById(id);
  if (el) { el.classList.add('active'); el.style.background = color; }
  document.getElementById('stop-btn').style.display = 'block';
}

async function playPacket(idx) {
  await Tone.start();
  const p = PACKETS[idx];
  setActive('pkt-' + p.prime, p.color);
  const s = makeSynth();
  const freqs = p.modes.map(k => k * BASE);
  s.triggerAttackRelease(freqs, 1.2);
  timers.push(setTimeout(() => stopAll(), 1500));
}

async function playFermion(idx) {
  await Tone.start();
  const f = FERMIONS[idx];
  setActive('frm-' + f.symbol, SCOLORS[f.sector]);
  const s = makeSynth();
  const packets = f.primes.map(p => PACKETS.find(pk => pk.prime === p));
  let delay = 0;
  packets.forEach(packet => {
    timers.push(setTimeout(() => {
      const freqs = packet.modes.map(k => k * BASE);
      s.triggerAttackRelease(freqs, 0.6);
    }, delay));
    delay += 500;
  });
  timers.push(setTimeout(() => stopAll(), delay + 800));
}

// Build UI
window.addEventListener('DOMContentLoaded', () => {
  const pg = document.getElementById('packets');
  PACKETS.forEach((p, i) => {
    const btn = document.createElement('button');
    btn.className = 'packet-btn';
    btn.id = 'pkt-' + p.prime;
    btn.style.border = '1px solid ' + p.color;
    btn.onclick = () => playPacket(i);
    btn.innerHTML = '<div class="prime">' + p.prime + '</div>'
      + '<div class="modes">' + p.modes.map(k => 'k=' + k).join(', ') + '</div>'
      + '<div class="freqs">' + p.modes.map(k => k * BASE).join(', ') + ' Hz</div>';
    pg.appendChild(btn);
  });

  const fg = document.getElementById('fermions');
  FERMIONS.forEach((f, i) => {
    const btn = document.createElement('button');
    btn.className = 'fermion-btn';
    btn.id = 'frm-' + f.symbol;
    btn.style.border = '1px solid ' + SCOLORS[f.sector];
    btn.onclick = () => playFermion(i);
    btn.innerHTML = '<div><span class="symbol">' + f.symbol + '</span><span class="name">' + f.name + '</span></div>'
      + '<div class="primes">' + (f.a > 0 ? '(2' + (f.a > 1 ? '^' + f.a : '') + ') × ' : '') + f.primes.join(' × ') + '</div>';
    fg.appendChild(btn);
  });
});
</script>
</body>
</html>
